<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Post a Task - QuickHire</title>
  <link rel="stylesheet" href="../css/style.css">
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="../js/supabase-client.js"></script>
  <script src="../js/auth.js"></script>
  <script src="../js/company.js"></script>
</head>
<body>
  <nav>
    <div><b>QuickHire</b></div>
    <ul>
      <li><a href="#" onclick="logout(); return false;">Logout</a></li>
    </ul>
  </nav>

  <div class="two-col">
    <div class="sidebar">
      <ul>
        <li><a href="dashboard.html">Dashboard</a></li>
        <li><a href="post-task.html">Post a Task</a></li>
        <li><a href="my-tasks.html">My Tasks</a></li>
        <li><a href="review-applications.html">Review Applications</a></li>
        <li><a href="profile.html">Profile</a></li>
      </ul>
    </div>

    <div class="main-area">
      <h2>Post a New Task</h2>
      
      <form onsubmit="event.preventDefault(); postTask({
        title: this.title.value,
        description: this.description.value,
        skills: this.skills.value,
        deliverables: this.deliverables.value,
        payment: this.payment.value,
        deadline: this.deadline.value
      });">
        <label>Task Title</label>
        <input type="text" name="title" required>
        
        <label>Description</label>
        <textarea name="description" rows="5" required></textarea>
        
        <label>Required Skills (comma separated)</label>
        <input type="text" name="skills" placeholder="e.g. Python, Excel, Writing" required>
        
        <label>Deliverables</label>
        <textarea name="deliverables" rows="4" required></textarea>
        
        <label>Payment Amount (BDT)</label>
        <input type="number" name="payment" required>
        
        <label>Deadline</label>
        <input type="date" name="deadline" required>
        
        <input type="submit" value="Post Task">
      </form>
    </div>
  </div>

  <script>
    document.addEventListener('DOMContentLoaded', checkAuth);
  </script>
</body>
</html>
