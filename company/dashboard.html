<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Company Dashboard - QuickHire</title>
  <link rel="stylesheet" href="../css/style.css">
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="../js/supabase-client.js"></script>
  <script src="../js/auth.js"></script>
  <script src="../js/company.js"></script>
</head>
<body>
  <nav>
    <div><b>QuickHire</b></div>
    <ul>
      <li><a href="#" onclick="logout(); return false;">Logout</a></li>
    </ul>
  </nav>

  <div class="two-col">
    <div class="sidebar">
      <ul>
        <li><a href="dashboard.html">Dashboard</a></li>
        <li><a href="post-task.html">Post a Task</a></li>
        <li><a href="my-tasks.html">My Tasks</a></li>
        <li><a href="review-applications.html">Review Applications</a></li>
        <li><a href="profile.html">Profile</a></li>
      </ul>
    </div>

    <div class="main-area">
      <h2 id="welcome-msg">Welcome, Company</h2>
      
      <div class="stats-row">
        <div class="stat-box">
          <h3 id="tasks-posted">0</h3>
          <p>Tasks Posted</p>
        </div>
        <div class="stat-box">
          <h3 id="total-applications">0</h3>
          <p>Total Applications</p>
        </div>
        <div class="stat-box">
          <h3 id="in-progress">0</h3>
          <p>In Progress</p>
        </div>
        <div class="stat-box">
          <h3 id="completed">0</h3>
          <p>Completed</p>
        </div>
      </div>

      <h3>Recent Tasks</h3>
      <table>
        <thead>
          <tr>
            <th>Title</th>
            <th>Payment</th>
            <th>Deadline</th>
            <th>Status</th>
          </tr>
        </thead>
        <tbody id="recent-tasks">
        </tbody>
      </table>
    </div>
  </div>

  <script>
    document.addEventListener('DOMContentLoaded', loadCompanyDashboard);
  </script>
</body>
</html>
