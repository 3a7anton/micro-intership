<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Submit Work - QuickHire</title>
  <link rel="stylesheet" href="../css/style.css">
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="../js/supabase-client.js"></script>
  <script src="../js/auth.js"></script>
  <script src="../js/student.js"></script>
</head>
<body>
  <nav>
    <div><b>QuickHire</b></div>
    <ul>
      <li><a href="#" onclick="logout(); return false;">Logout</a></li>
    </ul>
  </nav>

  <div class="two-col">
    <div class="sidebar">
      <ul>
        <li><a href="dashboard.html">Dashboard</a></li>
        <li><a href="browse.html">Browse Tasks</a></li>
        <li><a href="applications.html">My Applications</a></li>
        <li><a href="certificates.html">My Certificates</a></li>
        <li><a href="earnings.html">My Earnings</a></li>
        <li><a href="profile.html">My Profile</a></li>
      </ul>
    </div>

    <div class="main-area">
      <h2>Submit Work</h2>
      
      <p><b>Task:</b> <span id="task-name"></span></p>
      <p><b>Deadline:</b> <span id="task-deadline"></span></p>
      
      <form onsubmit="event.preventDefault(); submitWork(this.file.files[0]);">
        <label>Upload Your Work</label>
        <input type="file" name="file" required>
        <p>Accepted formats: PDF, DOCX, ZIP, images</p>
        
        <input type="submit" value="Submit Work">
      </form>
    </div>
  </div>

  <script>
    document.addEventListener('DOMContentLoaded', loadSubmitWorkPage);
  </script>
</body>
</html>
