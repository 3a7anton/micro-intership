<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Student Dashboard - QuickHire</title>
  <link rel="stylesheet" href="../css/style.css">
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="../js/supabase-client.js"></script>
  <script src="../js/auth.js"></script>
  <script src="../js/student.js"></script>
</head>
<body>
  <nav>
    <div><b>QuickHire</b></div>
    <ul>
      <li><a href="#" onclick="logout(); return false;">Logout</a></li>
    </ul>
  </nav>

  <div class="two-col">
    <div class="sidebar">
      <ul>
        <li><a href="dashboard.html">Dashboard</a></li>
        <li><a href="browse.html">Browse Tasks</a></li>
        <li><a href="applications.html">My Applications</a></li>
        <li><a href="certificates.html">My Certificates</a></li>
        <li><a href="earnings.html">My Earnings</a></li>
        <li><a href="profile.html">My Profile</a></li>
      </ul>
    </div>

    <div class="main-area">
      <h2 id="welcome-msg">Welcome, Student</h2>
      
      <div class="stats-row">
        <div class="stat-box">
          <h3 id="applications-sent">0</h3>
          <p>Applications Sent</p>
        </div>
        <div class="stat-box">
          <h3 id="in-progress">0</h3>
          <p>In Progress</p>
        </div>
        <div class="stat-box">
          <h3 id="completed">0</h3>
          <p>Completed</p>
        </div>
        <div class="stat-box">
          <h3 id="total-earned">0 BDT</h3>
          <p>Total Earned</p>
        </div>
      </div>

      <h3>Recent Applications</h3>
      <table>
        <thead>
          <tr>
            <th>Task Name</th>
            <th>Company</th>
            <th>Status</th>
            <th>Date Applied</th>
          </tr>
        </thead>
        <tbody id="recent-applications">
        </tbody>
      </table>
    </div>
  </div>

  <script>
    document.addEventListener('DOMContentLoaded', loadStudentDashboard);
  </script>
</body>
</html>
