<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Login - QuickHire</title>
  <link rel="stylesheet" href="css/style.css">
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="js/supabase-client.js"></script>
  <script src="js/auth.js"></script>
</head>
<body>
  <nav>
    <div><b>QuickHire</b></div>
    <ul>
      <li><a href="index.html">Home</a></li>
    </ul>
  </nav>

  <div class="form-card">
    <h2>Login to QuickHire</h2>
    <form onsubmit="event.preventDefault(); login(this.email.value, this.password.value);">
      <label>Email</label>
      <input type="email" name="email" required>
      
      <label>Password</label>
      <input type="password" name="password" required>
      
      <input type="submit" value="Login">
    </form>
    <p>Don't have an account? <a href="register-student.html">Register as Student</a> | <a href="register-company.html">Register as Company</a></p>
  </div>
</body>
</html>
